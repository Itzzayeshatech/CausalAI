services:
  # Backend API Service
  - type: web
    name: causalai-backend
    env: node
    repo: https://github.com/Itzzayeshatech/CausalAI.git
    rootDir: backend
    branch: main
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        value: mongodb://itzzzsiddique_db_user:Ayesha2005@ac-oj2psoe-shard-00-00.i2kkrbi.mongodb.net:27017,ac-oj2psoe-shard-00-01.i2kkrbi.mongodb.net:27017,ac-oj2psoe-shard-00-02.i2kkrbi.mongodb.net:27017/?ssl=true&replicaSet=atlas-zuvonh-shard-0&authSource=admin&appName=Cluster0
      - key: JWT_SECRET
        value: causalai-production-secret-key-2024
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: UPLOAD_DIR
        value: uploads
      - key: AI_SERVICE_URL
        value: http://localhost:8000/analyze

  # Frontend Service
  - type: web
    name: causalai-frontend
    env: static
    repo: https://github.com/Itzzayeshatech/CausalAI.git
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        value: https://causalai-backend.onrender.com

  # ML Service (Python)
  - type: web
    name: causalai-ml
    env: python
    repo: https://github.com/Itzzayeshatech/CausalAI.git
    rootDir: ai-service
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    envVars:
      - key: AI_SERVICE_HOST
        value: 0.0.0.0
      - key: AI_SERVICE_PORT
        value: 8000
      - key: AI_SERVICE_DEBUG
        value: false
